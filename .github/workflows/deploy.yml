name: Deploy to VPS
on:
  push:
      branches: [main]
      jobs:
        deploy:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4
                            - name: Deploy to VPS
                                    uses: appleboy/ssh-action@v1.0.3
                                            with:
                                                      host: ${{ secrets.VPS_HOST }}
                                                                username: root
                                                                          key: ${{ secrets.VPS_SSH_KEY }}
                                                                                    script: |
                                                                                                cd /tmp && rm -rf workout-app
                                                                                                            git clone --depth 1 https://github.com/brandoncheema-ops/workout-app.git
                                                                                                                        rm -rf workout-app/.git
                                                                                                                                    rsync -av --delete workout-app/ /var/www/brandon.nfapps.ai/workout-app/
                                                                                                                                                rm -rf /tmp/workout-app
